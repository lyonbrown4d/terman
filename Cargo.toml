[package]
name = "terman"
version = "0.1.0"
edition = "2024"

[workspace]
members = [
    "crates/screen",
    "crates/tmux",
    "crates/common",
]
resolver = "2"

[workspace.dependencies]
clap = { version = "4.5.20", features = ["derive"] }
crossterm = "0.29.0"
portable-pty = "0.8"
terman-common = { path = "crates/common" }
which = "6.0"

[dependencies]
clap = { workspace = true }
terman-common = { workspace = true }
terman-screen = { path = "crates/screen" }
terman-tmux = { path = "crates/tmux" }
