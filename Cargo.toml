[workspace]
members = [
    "crates/screen",
    "crates/tmux",
    "crates/common",
]
resolver = "2"

[workspace.dependencies]
clap = { version = "4.6.1", features = ["derive"] }
crossterm = "0.29.0"
portable-pty = "0.9.0"
terman-common = { path = "crates/common" }
tokio = { version = "1.52.3", features = ["process", "rt", "time"] }
which = "8.0.4"
